services:
  - type: web
    name: job-agent
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Primary LLM = Groq (free, reliable). Falls back automatically to gemini → huggingface
      # if GROQ_API_KEY is unset, so this is safe to leave as groq even before you add the key.
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # HuggingFace kept as a final fallback.
      - key: HF_MODEL
        value: Qwen/Qwen3-8B
      - key: HF_PROVIDER
        value: groq
      - key: HF_API_KEY
        sync: false
      # Free PAT raises GitHub contact-discovery from 60 → 5000 req/hr.
      - key: GITHUB_TOKEN
        sync: false
      # Optional: Adzuna (India + salary data). Source is skipped gracefully if unset.
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: TRACKING_SHEET_ID
        sync: false
      - key: MIN_SALARY_INR
        value: "50000"
      - key: MAX_LISTING_AGE_DAYS
        value: "4"
      - key: SENDER_EMAIL
        value: vatsalomar1@gmail.com
      - key: SENDER_NAME
        value: Vatsal Omar
      - key: DISABLE_PLAYWRIGHT
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: API_KEY
        sync: false
