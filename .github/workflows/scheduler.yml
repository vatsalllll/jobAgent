name: Job Agent Scheduler

on:
  schedule:
    - cron: "0 */4 * * *"
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch:

jobs:
  sweep-and-sync:
    if: github.event.schedule == '0 */4 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Daily sweep — discover, tailor, email
        run: |
          echo "Triggering daily sweep..."
          RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/daily-sweep?max_jobs=10&tailor=true&generate_emails=true" \
            --max-time 300 \
            -w "\nHTTP_CODE:%{http_code}")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Sweep failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Sweep completed at $(date -u)"

      - name: Sync to Google Sheets
        run: |
          echo "Syncing to Google Sheets..."
          RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/sync-sheets" \
            --max-time 60 \
            -w "\nHTTP_CODE:%{http_code}")
          echo "$RESPONSE"
          echo "Sync completed at $(date -u)"

  check-emails:
    if: github.event.schedule == '0 2,8,14,20 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Check email replies + auto-update statuses
        run: |
          echo "Checking email replies..."
          RESPONSE=$(curl -s -X POST "${{ secrets.RENDER_URL }}/check-emails" \
            --max-time 120 \
            -w "\nHTTP_CODE:%{http_code}")
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Email check failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Email check completed at $(date -u)"
