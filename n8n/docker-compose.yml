# n8n — Self-hosted workflow automation
# Runs alongside the FastAPI job agent service.
# Start: docker compose up -d
# Access: http://localhost:5678

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: job-agent-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=change-me-to-a-random-32-char-string
      - N8N_USER_MANAGEMENT_DISABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - WEBHOOK_URL=http://localhost:5678/
      # External hook for calling the FastAPI service
      - EXTERNAL_HOOK_FILES=/data
    volumes:
      - n8n_data:/home/node/.n8n
      - ../backend/data:/data:ro  # read-only access to data files
    extra_hosts:
      - "host.docker.internal:host-gateway"  # allows calling FastAPI on host

volumes:
  n8n_data:
